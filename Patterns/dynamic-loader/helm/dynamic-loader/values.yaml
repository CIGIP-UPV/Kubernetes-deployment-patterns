replicaCount: 1

images:
  camera:
    repository: ros2-camera
    tag: latest
    pullPolicy: IfNotPresent
  dynamicHost:
    repository: ros2-yolo
    tag: latest
    pullPolicy: IfNotPresent
imagePullSecrets: []

ros:
  domainId: "42"
  rmwImplementation: rmw_cyclonedds_cpp
  localhostOnly: "0"

network:
  hostNetwork: true

camera:
  device: /dev/video0
  width: 1280
  height: 720
  fps: 30
  frameId: camera
  syntheticMode: false
  mountVideoDevice: true

dynamic:
  apiPort: 5000
  autoLoadYolo: true
  modelPath: /opt/models/yolov8n.pt
  conf: 0.25
  publishDebugImage: "false"
  publishMetrics: "true"
  allowedModules:
    - yolo_detector

topics:
  image: /camera/image_raw
  detections: /detections
  debugImage: /detections/image
  latency: /benchmark/latency_ms
  inference: /benchmark/inference_ms

resources:
  camera:
    requests: { cpu: 300m, memory: 512Mi }
    limits: { cpu: 1000m, memory: 1Gi }
  dynamicHost:
    requests: { cpu: 1000m, memory: 2Gi }
    limits: { cpu: 4000m, memory: 8Gi }

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

nodeSelector: {}
affinity: {}
tolerations: []

nameOverride: ""
fullnameOverride: ""
