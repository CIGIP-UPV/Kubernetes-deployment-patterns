apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynamic-loader.fullname" . }}-code
  labels:
    {{- include "dynamic-loader.labels" . | nindent 4 }}
data:
  server.py: |
    import os
    import signal
    import subprocess
    import threading
    from typing import Dict

    from fastapi import FastAPI, HTTPException

    app = FastAPI(title="ROS2 Dynamic Loader API", version="1.0.0")

    ALLOWED_MODULES = set(
        m.strip() for m in os.getenv("ALLOWED_MODULES", "yolo_detector").split(",") if m.strip()
    )
    AUTO_LOAD_YOLO = os.getenv("AUTO_LOAD_YOLO", "true").lower() == "true"

    MODEL_PATH = os.getenv("YOLO_MODEL_PATH", "yolov8n.pt")
    YOLO_CONF = os.getenv("YOLO_CONF", "0.25")
    IMAGE_TOPIC = os.getenv("IMAGE_TOPIC", "/camera/image_raw")
    DETECTIONS_TOPIC = os.getenv("DETECTIONS_TOPIC", "/detections")
    DEBUG_IMAGE_TOPIC = os.getenv("DEBUG_IMAGE_TOPIC", "/detections/image")
    PUBLISH_DEBUG = os.getenv("YOLO_PUBLISH_DEBUG", "false")
    PUBLISH_METRICS = os.getenv("YOLO_PUBLISH_METRICS", "true")
    LATENCY_TOPIC = os.getenv("LATENCY_TOPIC", "/benchmark/latency_ms")
    INFERENCE_TOPIC = os.getenv("INFERENCE_TOPIC", "/benchmark/inference_ms")

    _lock = threading.Lock()
    _process: subprocess.Popen | None = None

    def _is_running() -> bool:
        return _process is not None and _process.poll() is None

    def _start_yolo() -> Dict[str, str]:
        global _process
        with _lock:
            if _is_running():
                return {"status": "already_running", "pid": str(_process.pid)}

            cmd = [
                "/bin/bash",
                "-lc",
                (
                    "set -e; "
                    "source /opt/ros/humble/setup.bash; "
                    "if [ -f /opt/ros_ws/install/setup.bash ]; then source /opt/ros_ws/install/setup.bash; fi; "
                    "ros2 run yolo_detector_pkg yolo_detector --ros-args "
                    f"-p model_path:={MODEL_PATH} "
                    f"-p conf:={YOLO_CONF} "
                    f"-p image_topic:={IMAGE_TOPIC} "
                    f"-p detections_topic:={DETECTIONS_TOPIC} "
                    f"-p debug_image_topic:={DEBUG_IMAGE_TOPIC} "
                    f"-p publish_debug_image:={PUBLISH_DEBUG} "
                    f"-p publish_metrics:={PUBLISH_METRICS} "
                    f"-p latency_topic:={LATENCY_TOPIC} "
                    f"-p inference_topic:={INFERENCE_TOPIC}"
                ),
            ]
            _process = subprocess.Popen(cmd)
            return {"status": "started", "pid": str(_process.pid)}

    def _stop_yolo() -> Dict[str, str]:
        global _process
        with _lock:
            if not _is_running():
                _process = None
                return {"status": "not_running"}
            _process.send_signal(signal.SIGTERM)
            try:
                _process.wait(timeout=10)
            except subprocess.TimeoutExpired:
                _process.kill()
            pid = _process.pid
            _process = None
            return {"status": "stopped", "pid": str(pid)}

    @app.on_event("startup")
    def _startup() -> None:
        if AUTO_LOAD_YOLO:
            _start_yolo()

    @app.on_event("shutdown")
    def _shutdown() -> None:
        _stop_yolo()

    @app.get("/")
    def root() -> Dict[str, str]:
        return {"service": "dynamic-loader", "status": "running"}

    @app.get("/health")
    def health() -> Dict[str, str]:
        return {"status": "healthy", "yolo_running": str(_is_running()).lower()}

    @app.get("/status")
    def status() -> Dict[str, str]:
        pid = str(_process.pid) if _is_running() else ""
        return {"yolo_running": str(_is_running()).lower(), "pid": pid}

    @app.post("/modules/load/{module_name}")
    def load_module(module_name: str) -> Dict[str, str]:
        if module_name not in ALLOWED_MODULES:
            raise HTTPException(status_code=403, detail=f"module '{module_name}' not allowed")
        if module_name != "yolo_detector":
            raise HTTPException(status_code=400, detail="only 'yolo_detector' is supported")
        return _start_yolo()

    @app.post("/modules/unload/{module_name}")
    def unload_module(module_name: str) -> Dict[str, str]:
        if module_name not in ALLOWED_MODULES:
            raise HTTPException(status_code=403, detail=f"module '{module_name}' not allowed")
        if module_name != "yolo_detector":
            raise HTTPException(status_code=400, detail="only 'yolo_detector' is supported")
        return _stop_yolo()
