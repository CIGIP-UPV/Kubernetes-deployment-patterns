apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dynamic-loader.fullname" . }}
  labels:
    {{- include "dynamic-loader.labels" . | nindent 4 }}
    pattern: dynamic-loader
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dynamic-loader.name" . }}
      pattern: dynamic-loader
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "dynamic-loader.name" . }}
        pattern: dynamic-loader
        {{- include "dynamic-loader.labels" . | nindent 8 }}
    spec:
      {{- if .Values.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: camera
          image: "{{ .Values.images.camera.repository }}:{{ .Values.images.camera.tag }}"
          imagePullPolicy: {{ .Values.images.camera.pullPolicy }}
          env:
            - name: ROS_DOMAIN_ID
              value: {{ .Values.ros.domainId | quote }}
            - name: RMW_IMPLEMENTATION
              value: {{ .Values.ros.rmwImplementation | quote }}
            - name: ROS_LOCALHOST_ONLY
              value: {{ .Values.ros.localhostOnly | quote }}
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -e
              source /opt/ros/humble/setup.bash
              if [ -f /opt/ros2_cam_ws/install/setup.bash ]; then
                source /opt/ros2_cam_ws/install/setup.bash
              fi
              ros2 run camera_driver_pkg camera_driver --ros-args \
                -p device:={{ .Values.camera.device | quote }} \
                -p width:={{ .Values.camera.width }} \
                -p height:={{ .Values.camera.height }} \
                -p fps:={{ .Values.camera.fps }} \
                -p frame_id:={{ .Values.camera.frameId | quote }} \
                -p synthetic_mode:={{ .Values.camera.syntheticMode | quote }} \
                -p image_topic:={{ .Values.topics.image | quote }}
          resources:
            {{- toYaml .Values.resources.camera | nindent 12 }}
          {{- if and .Values.camera.mountVideoDevice (not .Values.camera.syntheticMode) }}
          volumeMounts:
            - name: video-device
              mountPath: /dev/video0
          {{- end }}
        - name: dynamic-host
          image: "{{ .Values.images.dynamicHost.repository }}:{{ .Values.images.dynamicHost.tag }}"
          imagePullPolicy: {{ .Values.images.dynamicHost.pullPolicy }}
          workingDir: /app
          env:
            - name: ROS_DOMAIN_ID
              value: {{ .Values.ros.domainId | quote }}
            - name: RMW_IMPLEMENTATION
              value: {{ .Values.ros.rmwImplementation | quote }}
            - name: ROS_LOCALHOST_ONLY
              value: {{ .Values.ros.localhostOnly | quote }}
            - name: PORT
              value: {{ .Values.dynamic.apiPort | quote }}
            - name: AUTO_LOAD_YOLO
              value: {{ .Values.dynamic.autoLoadYolo | quote }}
            - name: ALLOWED_MODULES
              value: {{ .Values.dynamic.allowedModules | join "," | quote }}
            - name: YOLO_MODEL_PATH
              value: {{ .Values.dynamic.modelPath | quote }}
            - name: YOLO_CONF
              value: {{ .Values.dynamic.conf | quote }}
            - name: YOLO_PUBLISH_DEBUG
              value: {{ .Values.dynamic.publishDebugImage | quote }}
            - name: YOLO_PUBLISH_METRICS
              value: {{ .Values.dynamic.publishMetrics | quote }}
            - name: IMAGE_TOPIC
              value: {{ .Values.topics.image | quote }}
            - name: DETECTIONS_TOPIC
              value: {{ .Values.topics.detections | quote }}
            - name: DEBUG_IMAGE_TOPIC
              value: {{ .Values.topics.debugImage | quote }}
            - name: LATENCY_TOPIC
              value: {{ .Values.topics.latency | quote }}
            - name: INFERENCE_TOPIC
              value: {{ .Values.topics.inference | quote }}
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -e
              source /opt/ros/humble/setup.bash
              if [ -f /opt/ros_ws/install/setup.bash ]; then
                source /opt/ros_ws/install/setup.bash
              fi
              python3 -m uvicorn server:app --host 0.0.0.0 --port ${PORT}
          ports:
            - name: http-api
              containerPort: {{ .Values.dynamic.apiPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources.dynamicHost | nindent 12 }}
          volumeMounts:
            - name: app-code
              mountPath: /app
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: {{ include "dynamic-loader.fullname" . }}-code
        {{- if and .Values.camera.mountVideoDevice (not .Values.camera.syntheticMode) }}
        - name: video-device
          hostPath:
            path: /dev/video0
            type: CharDevice
        {{- end }}
