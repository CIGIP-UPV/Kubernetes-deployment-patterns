apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ros2-overlay.fullname" . }}
  labels:
    {{- include "ros2-overlay.labels" . | nindent 4 }}
    pattern: overlay-workspaces
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ros2-overlay.name" . }}
      pattern: overlay-workspaces
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "ros2-overlay.name" . }}
        pattern: overlay-workspaces
        {{- include "ros2-overlay.labels" . | nindent 8 }}
    spec:
      {{- if .Values.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: overlay-runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ROS_DOMAIN_ID
              value: {{ .Values.ros.domainId | quote }}
            - name: RMW_IMPLEMENTATION
              value: {{ .Values.ros.rmwImplementation | quote }}
            - name: ROS_LOCALHOST_ONLY
              value: {{ .Values.ros.localhostOnly | quote }}
            - name: CAMERA_DEVICE
              value: {{ .Values.camera.device | quote }}
            - name: CAMERA_WIDTH
              value: {{ .Values.camera.width | quote }}
            - name: CAMERA_HEIGHT
              value: {{ .Values.camera.height | quote }}
            - name: CAMERA_FPS
              value: {{ .Values.camera.fps | quote }}
            - name: CAMERA_FRAME_ID
              value: {{ .Values.camera.frameId | quote }}
            - name: CAMERA_SYNTHETIC_MODE
              value: {{ .Values.camera.syntheticMode | quote }}
            - name: IMAGE_TOPIC
              value: {{ .Values.topics.image | quote }}
            - name: DETECTIONS_TOPIC
              value: {{ .Values.topics.detections | quote }}
            - name: DEBUG_IMAGE_TOPIC
              value: {{ .Values.topics.debugImage | quote }}
            - name: LATENCY_TOPIC
              value: {{ .Values.topics.latency | quote }}
            - name: INFERENCE_TOPIC
              value: {{ .Values.topics.inference | quote }}
            - name: YOLO_MODEL_PATH
              value: {{ .Values.yolo.modelPath | quote }}
            - name: YOLO_CONF
              value: {{ .Values.yolo.conf | quote }}
            - name: YOLO_PUBLISH_DEBUG
              value: {{ .Values.yolo.publishDebugImage | quote }}
            - name: YOLO_PUBLISH_METRICS
              value: {{ .Values.yolo.publishMetrics | quote }}
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -e
              source /opt/ros/humble/setup.bash
              source /opt/base_ws/install/setup.bash
              source /opt/overlay_ws/install/setup.bash

              echo "[overlay] Starting camera node from base workspace..."
              ros2 run camera_driver_pkg camera_driver --ros-args \
                -p device:=${CAMERA_DEVICE} \
                -p width:=${CAMERA_WIDTH} \
                -p height:=${CAMERA_HEIGHT} \
                -p fps:=${CAMERA_FPS} \
                -p frame_id:=${CAMERA_FRAME_ID} \
                -p synthetic_mode:=${CAMERA_SYNTHETIC_MODE} \
                -p image_topic:=${IMAGE_TOPIC} &
              CAMERA_PID=$!

              sleep {{ .Values.yolo.startDelaySeconds }}
              echo "[overlay] Starting yolo node from overlay workspace..."
              ros2 run yolo_detector_pkg yolo_detector --ros-args \
                -p model_path:=${YOLO_MODEL_PATH} \
                -p conf:=${YOLO_CONF} \
                -p image_topic:=${IMAGE_TOPIC} \
                -p detections_topic:=${DETECTIONS_TOPIC} \
                -p debug_image_topic:=${DEBUG_IMAGE_TOPIC} \
                -p publish_debug_image:=${YOLO_PUBLISH_DEBUG} \
                -p publish_metrics:=${YOLO_PUBLISH_METRICS} \
                -p latency_topic:=${LATENCY_TOPIC} \
                -p inference_topic:=${INFERENCE_TOPIC} &
              YOLO_PID=$!

              wait -n ${CAMERA_PID} ${YOLO_PID}
              exit 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if and .Values.camera.mountVideoDevice (not .Values.camera.syntheticMode) }}
          volumeMounts:
            - name: video-device
              mountPath: /dev/video0
          {{- end }}
      {{- if and .Values.camera.mountVideoDevice (not .Values.camera.syntheticMode) }}
      volumes:
        - name: video-device
          hostPath:
            path: /dev/video0
            type: CharDevice
      {{- end }}
