images:
  camera:
    repository: ros2-camera
    tag: latest
    pullPolicy: IfNotPresent
  yolo:
    repository: ros2-yolo
    tag: latest
    pullPolicy: IfNotPresent
imagePullSecrets: []

ros:
  domainId: "42"
  rmwImplementation: rmw_cyclonedds_cpp
  localhostOnly: "0"

network:
  hostNetwork: true

camera:
  enabled: true
  # Example edge placement: { role: edge }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  device: /dev/video0
  width: 1280
  height: 720
  fps: 30
  frameId: camera
  syntheticMode: false
  mountVideoDevice: true
  resources:
    requests: { cpu: 300m, memory: 512Mi }
    limits: { cpu: 1000m, memory: 1Gi }

yolo:
  enabled: true
  # Example cloud placement: { role: cloud }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  modelPath: /opt/models/yolov8n.pt
  conf: 0.25
  publishDebugImage: "false"
  publishMetrics: "true"
  resources:
    requests: { cpu: 1000m, memory: 2Gi }
    limits: { cpu: 4000m, memory: 8Gi }

topics:
  image: /camera/image_raw
  detections: /detections
  debugImage: /detections/image
  latency: /benchmark/latency_ms
  inference: /benchmark/inference_ms

nameOverride: ""
fullnameOverride: ""
